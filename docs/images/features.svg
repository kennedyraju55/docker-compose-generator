  <text x="140" y="60" text-anchor="middle" font-size="28">📦</text>
  <text x="140" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Service Catalog</text>
    <text x="140" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">20+ services: databases,</text>
    <text x="140" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">proxies, messaging, runtimes</text>

  <!-- Card 2 -->
  <rect x="280" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#06d6a0" stroke-width="1.5" opacity="0.95"/>
  <rect x="280" y="20" width="240" height="4" rx="2" fill="#06d6a0"/>
  <text x="400" y="60" text-anchor="middle" font-size="28">🏗️</text>
  <text x="400" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Stack Templates</text>
    <text x="400" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">MEAN, MERN, LAMP, Django,</text>
    <text x="400" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Rails, WordPress, ELK</text>

  <!-- Card 3 -->
  <rect x="540" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#06d6a0" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="20" width="240" height="4" rx="2" fill="#06d6a0"/>
  <text x="660" y="60" text-anchor="middle" font-size="28">🌍</text>
  <text x="660" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Env Profiles</text>
