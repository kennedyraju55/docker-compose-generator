  <rect x="540" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#06d6a0" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="185" width="240" height="4" rx="2" fill="#06d6a0"/>
  <text x="660" y="225" text-anchor="middle" font-size="28">🌐</text>
  <text x="660" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Network Templates</text>
    <text x="660" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Simple, isolated, overlay</text>
    <text x="660" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">network modes</text>

</svg>